{% extends "base.html" %}
{% block title %}서버 오류가 발생했습니다 | 굴삭기나라{% endblock %}
{% block content %}
<div class="container py-5 my-4">
  <div class="row justify-content-center">
    <div class="col-md-8 text-center">
      <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5" style="background:#ffffff;">
        <div class="mb-4">
          <i class="bi bi-gear-wide-connected text-danger" style="font-size: 3rem;"></i>
        </div>
        <h2 class="fw-bold mb-3">잠시 후 다시 시도해 주세요</h2>
        <p class="text-muted mb-4">
          서버 내부에서 오류가 발생했습니다.<br class="d-none d-md-block">
          잠시 후 다시 시도해 보시고, 문제가 계속되면 운영자에게 알려 주세요.
        </p>
        <div class="d-flex flex-column flex-md-row justify-content-center gap-2">
          <a href="{% url 'index' %}" class="btn btn-primary px-4 py-2">
            메인으로 이동
          </a>
          <button type="button" class="btn btn-outline-secondary px-4 py-2" onclick="location.reload();">
            새로고침
          </button>
        </div>
        <p class="text-muted mt-4 small mb-0">
          오류를 빠르게 해결할 수 있도록 노력하겠습니다.
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
