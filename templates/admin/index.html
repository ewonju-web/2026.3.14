{% extends "admin/index.html" %}
{% block content %}
<div id="content-main">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
        <div style="background: #fff; padding: 20px; border-radius: 10px; border-left: 5px solid #1a237e; shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <h4 style="margin:0; color:#777;">총 회원수</h4>
            <h2 style="margin:10px 0; color:#1a237e;">{{ total_users }}명</h2>
        </div>
        <div style="background: #fff; padding: 20px; border-radius: 10px; border-left: 5px solid #fbc02d; shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <h4 style="margin:0; color:#777;">전체 매물수</h4>
            <h2 style="margin:10px 0; color:#fbc02d;">{{ total_items }}개</h2>
        </div>
    </div>

    <div style="background: #fff; padding: 25px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <h4 style="font-weight: bold; margin-bottom: 20px;">📅 최근 7일 신규 가입 추이</h4>
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 2px solid #eee;">
                    <th style="padding: 10px; text-align: left;">날짜</th>
                    <th style="padding: 10px; text-align: right;">신규 가입자</th>
                </tr>
            </thead>
            <tbody>
                {% for stat in daily_stats %}
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding: 12px;">{{ stat.date|date:"Y-m-d" }}</td>
                    <td style="padding: 12px; text-align: right; font-weight: bold; color: #1a237e;">+{{ stat.c }}명</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <br>
    {{ block.super }}
</div>
{% endblock %}
