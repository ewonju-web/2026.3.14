{% extends "admin/base.html" %}

{% block extrahead %}
{{ block.super }}
<script>
(function () {
  var KEY = "admin_nav_sidebar_scroll_top";
  var LOCK_MS = 5000;
  var TICK_MS = 80;

  function getSidebarEl() {
    return document.getElementById("nav-sidebar");
  }

  function saveTop(top) {
    try {
      sessionStorage.setItem(KEY, String(top));
    } catch (e) {}
  }

  function loadTop() {
    try {
      var raw = sessionStorage.getItem(KEY);
      if (raw === null) return 0;
      var top = parseInt(raw, 10);
      return Number.isNaN(top) ? 0 : top;
    } catch (e) {
      return 0;
    }
  }

  // nav-sidebar 내부 요소 강제 scrollIntoView 차단 (자동 내려감 방지)
  if (!window.__gnBlockNavSidebarScrollIntoView && window.Element && Element.prototype.scrollIntoView) {
    window.__gnBlockNavSidebarScrollIntoView = true;
    var orig = Element.prototype.scrollIntoView;
    Element.prototype.scrollIntoView = function () {
      try {
        if (this && this.closest && this.closest("#nav-sidebar")) return;
      } catch (e) {}
      return orig.apply(this, arguments);
    };
  }

  document.addEventListener("DOMContentLoaded", function () {
    var sidebar = getSidebarEl();
    if (!sidebar) return;

    var savedTop = loadTop();
    var lockUntil = Date.now() + LOCK_MS;
    var manualMode = false;
    var internalSet = false;

    function setTop(top) {
      internalSet = true;
      sidebar.scrollTop = top;
      internalSet = false;
    }

    setTop(savedTop);

    var pinTimer = setInterval(function () {
      if (Date.now() > lockUntil || manualMode) {
        clearInterval(pinTimer);
        return;
      }
      setTop(savedTop);
    }, TICK_MS);

    sidebar.addEventListener("scroll", function () {
      if (internalSet) return;
      if (!manualMode && Date.now() < lockUntil) {
        setTop(savedTop);
        return;
      }
      savedTop = sidebar.scrollTop || 0;
      saveTop(savedTop);
    }, { passive: true });

    document.addEventListener("pointerdown", function (event) {
      var link = event.target && event.target.closest ? event.target.closest("#nav-sidebar a") : null;
      if (link) {
        savedTop = sidebar.scrollTop || 0;
        saveTop(savedTop);
      }
    }, true);

    // 휠/터치로 실제 스크롤 의도가 있을 때만 lock 해제
    sidebar.addEventListener("wheel", function () { manualMode = true; }, { passive: true });
    sidebar.addEventListener("touchstart", function () { manualMode = true; }, { passive: true });

    window.addEventListener("beforeunload", function () {
      saveTop(sidebar.scrollTop || 0);
    });
    window.addEventListener("pageshow", function () {
      savedTop = loadTop();
      setTop(savedTop);
    });
  });
})();
</script>
{% endblock %}

{% block branding %}
{{ block.super }}
<div style="margin:8px 0 0 0; padding:8px 12px; background:#f8f9fa; border:1px solid #e9ecef; border-radius:8px; font-size:13px; color:#555; display:flex; gap:10px; align-items:center;">
  <span>오늘 방문자 <strong>{{ VISITOR_TODAY }}</strong>명</span>
  <span style="opacity:.4;">|</span>
  <span>어제 방문자 <strong>{{ VISITOR_YESTERDAY }}</strong>명</span>
</div>
{% endblock %}
