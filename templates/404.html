{% extends "base.html" %}
{% block title %}페이지를 찾을 수 없습니다 | 굴삭기나라{% endblock %}
{% block content %}
<div class="container py-5 my-4">
  <div class="row justify-content-center">
    <div class="col-md-8 text-center">
      <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5" style="background:#ffffff;">
        <div class="mb-4">
          <i class="bi bi-exclamation-triangle text-warning" style="font-size: 3rem;"></i>
        </div>
        <h2 class="fw-bold mb-3">페이지를 찾을 수 없습니다</h2>
        <p class="text-muted mb-4">
          요청하신 주소가 변경되었거나, 삭제되었거나,<br class="d-none d-md-block">
          주소를 잘못 입력하셨을 수 있습니다.
        </p>
        <div class="d-flex flex-column flex-md-row justify-content-center gap-2">
          <a href="{% url 'index' %}" class="btn btn-primary px-4 py-2">
            메인으로 이동
          </a>
          <button type="button" class="btn btn-outline-secondary px-4 py-2" onclick="history.back();">
            이전 페이지
          </button>
        </div>
        <p class="text-muted mt-4 small mb-0">
          문제가 계속되면 운영자에게 문의해 주세요.
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
