{% extends "base.html" %}
{% block content %}
<div class="container py-4" style="max-width: 480px;">
    <div class="card border shadow-sm p-4" style="border-radius: 10px;">
        <h5 class="fw-bold mb-3">{% if LANG == 'en' %}Delete this post?{% else %}이 글을 삭제할까요?{% endif %}</h5>
        <p class="text-muted small mb-4">{{ post.title }}</p>
        <form method="post" action="">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">{% if LANG == 'en' %}Delete{% else %}삭제{% endif %}</button>
                <a href="{% url 'soil_detail' post.pk %}" class="btn btn-outline-secondary">{% if LANG == 'en' %}Cancel{% else %}취소{% endif %}</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
