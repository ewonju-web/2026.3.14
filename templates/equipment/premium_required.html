{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card border-warning shadow-sm">
        <div class="card-body text-center py-5">
          <i class="bi bi-lock-fill text-warning" style="font-size: 3rem;"></i>
          <h4 class="mt-3 fw-bold">{{ title|default:"유료 회원 전용" }}</h4>
          <p class="text-muted mt-2 mb-4">{{ message|default:"이 기능은 유료 회원만 이용할 수 있습니다." }}</p>
          {% if author_display %}
          <p class="small text-muted">판매자: {{ author_display }}</p>
          {% endif %}
          <a href="{% url 'index' %}" class="btn btn-primary">매물 목록으로</a>
          <a href="{% url 'my_page' %}" class="btn btn-outline-secondary ms-2">마이페이지</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
