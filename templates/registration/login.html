{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
                <div class="card-body p-5">
                    <h2 class="fw-bold mb-4 text-center" style="color: #111827; font-size: 1.5rem;">로그인</h2>
                    {% if messages %}
                    <div class="alert alert-danger py-2 small mb-3" role="alert">
                        {% for message in messages %}{{ message }}{% endfor %}
                    </div>
                    {% endif %}
                    <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next|urlencode }}{% endif %}">
                        {% csrf_token %}
                        {% if request.GET.next %}<input type="hidden" name="next" value="{{ request.GET.next }}">{% endif %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">아이디</label>
                            <input type="text" name="username" class="form-control" placeholder="아이디" required style="border-radius: 10px; padding: 0.75rem;">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-secondary">비밀번호</label>
                            <input type="password" name="password" class="form-control" placeholder="비밀번호" required style="border-radius: 10px; padding: 0.75rem;">
                        </div>
                        <button type="submit" class="btn w-100 fw-bold py-2 mb-3 text-dark" style="background: var(--gn-accent); border-radius: 10px;">로그인</button>
                    </form>
                    <div class="text-center small pt-2">
                        <p class="text-muted mb-1">회원이 아니신가요? <a href="{% url 'signup' %}" class="fw-bold" style="color: var(--gn-accent);">회원가입</a></p>
                        <p class="text-muted mb-0">
                            <a href="{% url 'find_username' %}" class="text-decoration-none text-secondary">아이디 찾기</a>
                            <span class="mx-1">|</span>
                            <a href="{% url 'password_reset' %}" class="text-decoration-none text-secondary">비밀번호 찾기</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
