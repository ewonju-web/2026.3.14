{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg border-0" style="border-radius: 20px; margin-top: 50px;">
            <div class="card-body p-5">
                <h3 class="text-center fw-bold mb-4" style="color: #1a237e;">비밀번호 찾기</h3>
                <p class="text-muted small text-center mb-4">가입 시 등록한 이메일을 입력하시면, 비밀번호 재설정 링크를 보내드립니다.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label small fw-bold">이메일</label>
                        <input type="email" name="email" class="form-control" placeholder="이메일 주소" maxlength="254" required style="border-radius: 8px; padding: 12px;">
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mb-3" style="border-radius: 10px;">재설정 메일 받기</button>
                </form>
                <div class="text-center">
                    <a href="{% url 'login' %}" class="text-warning fw-bold text-decoration-none small">로그인으로 돌아가기</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
