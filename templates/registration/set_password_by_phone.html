{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
                <div class="card-body p-5">
                    <h2 class="fw-bold mb-2 text-center" style="color: var(--gn-text); font-size: 1.35rem;">전화번호로 비밀번호 설정</h2>
                    <p class="text-muted small text-center mb-4">기존 굴삭기나라(direct-nara) 사이트에서 이관된 회원만 이용할 수 있습니다. 비밀번호 설정 후 로그인 화면으로 이동하면 <strong>로그인에 쓸 아이디</strong>를 안내해 드립니다.</p>
                    {% if messages %}
                    <div class="alert alert-danger py-2 small mb-3" role="alert">
                        {% for message in messages %}{{ message }}{% endfor %}
                    </div>
                    {% endif %}
                    <form method="post" action="{% url 'set_password_by_phone' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">가입 시 등록한 전화번호</label>
                            <input type="text" name="phone" class="form-control" placeholder="010-0000-0000" value="{{ phone_value|default:'' }}" required style="border-radius: 10px;" autocomplete="tel">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">새 비밀번호 (8자 이상)</label>
                            <input type="password" name="password1" class="form-control" placeholder="새 비밀번호" required minlength="8" style="border-radius: 10px;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">새 비밀번호 확인</label>
                            <input type="password" name="password2" class="form-control" placeholder="새 비밀번호 확인" required minlength="8" style="border-radius: 10px;">
                        </div>
                        <button type="submit" class="btn w-100 fw-bold py-2 text-dark mb-3" style="background: var(--gn-accent); border-radius: 10px;">비밀번호 설정</button>
                    </form>
                    <p class="text-center text-muted small mb-0">
                        <a href="{% url 'login' %}" class="fw-bold" style="color: var(--gn-accent);">로그인</a>으로 돌아가기
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
