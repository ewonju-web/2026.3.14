{% extends "base.html" %}
{% block content %}
<div class="container py-4" style="max-width: 480px;">
    <h2 class="section-title mb-3">정식 회원 전환</h2>
    <p class="text-muted small mb-2">
        기존 사이트(direct-nara)에서 이관된 회원입니다. 서비스를 이용하려면 <strong>새 로그인 아이디·이메일·비밀번호</strong>를 설정해 주세요.
    </p>
    <p class="text-muted small mb-4"><span class="badge bg-secondary">4. 새 아이디 / 비밀번호 / 이메일 설정</span> → 전환 완료</p>
    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body p-4">
            <form method="post" action="{% url 'legacy_convert' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_new_username" class="form-label fw-bold">새 로그인 아이디</label>
                    <input type="text" name="new_username" id="id_new_username" class="form-control" required
                           value="{{ new_username|default:'' }}" placeholder="영문, 숫자 조합"
                           maxlength="150" autocomplete="username">
                </div>
                <div class="mb-3">
                    <label for="id_email" class="form-label fw-bold">이메일</label>
                    <input type="email" name="email" id="id_email" class="form-control" required
                           value="{{ email|default:'' }}" placeholder="example@email.com"
                           autocomplete="email">
                </div>
                <div class="mb-3">
                    <label for="id_password1" class="form-label fw-bold">새 비밀번호</label>
                    <input type="password" name="password1" id="id_password1" class="form-control" required
                           placeholder="8자 이상" minlength="8" autocomplete="new-password">
                </div>
                <div class="mb-4">
                    <label for="id_password2" class="form-label fw-bold">비밀번호 확인</label>
                    <input type="password" name="password2" id="id_password2" class="form-control" required
                           placeholder="위와 동일하게 입력" autocomplete="new-password">
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary fw-bold py-2">전환 완료</button>
                    <a href="{% url 'my_page' %}" class="btn btn-outline-secondary">마이페이지로</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
