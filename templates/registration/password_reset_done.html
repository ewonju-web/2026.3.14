{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg border-0" style="border-radius: 20px; margin-top: 50px;">
            <div class="card-body p-5 text-center">
                <h3 class="fw-bold mb-4" style="color: #1a237e;">메일을 확인해 주세요</h3>
                <p class="text-muted small">입력하신 이메일로 비밀번호 재설정 링크를 보냈습니다. 메일이 오지 않으면 스팸함을 확인해 주세요.</p>
                <p class="mt-4 mb-0"><a href="{% url 'login' %}" class="btn btn-warning fw-bold" style="border-radius: 10px;">로그인으로 돌아가기</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
