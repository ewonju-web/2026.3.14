{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
                <div class="card-body p-5 text-center">
                    <h2 class="fw-bold mb-3" style="color: var(--gn-text); font-size: 1.5rem;">회원가입이 완료되었습니다.</h2>
                    <p class="text-muted mb-2">아래 버튼을 클릭하면 로그인 페이지로 이동합니다.</p>
                    <p class="text-muted small mb-4">3초 후 자동으로 로그인 페이지로 이동합니다.</p>
                    <a href="{% url 'login' %}" class="btn fw-bold py-2 px-4 text-dark" style="background: var(--gn-accent); border-radius: 10px;">
                        로그인하러 가기
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
setTimeout(function () {
    window.location.href = "{% url 'login' %}";
}, 3000);
</script>
{% endblock %}
