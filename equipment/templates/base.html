<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>굴삭기나라</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --main-navy: #1a237e; --point-yellow: #fbc02d; }
        body { background-color: #f8f9fa; font-family: 'Apple SD Gothic Neo', sans-serif; }
        .navbar { background-color: var(--main-navy) !important; padding: 12px 0; border-bottom: 3px solid var(--point-yellow); }
        .nav-link { color: white !important; font-weight: 600; margin: 0 10px; }
        .nav-link:hover { color: var(--point-yellow) !important; }
        .user-section { color: white; text-align: right; }
        .btn-post { background-color: var(--point-yellow); color: #000 !important; font-weight: 800; border-radius: 8px; border: none; padding: 8px 20px; }
        .btn-post:hover { background-color: #f9a825; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🚜 굴삭기나라</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-truck me-1"></i>중고매물</a></li>
                    <li class="nav-item"><a class="nav-link" href="/parts/"><i class="bi bi-gear me-1"></i>부품/어테치먼트</a></li>
                    <li class="nav-item"><a class="nav-link" href="/jobs/"><i class="bi bi-person-badge me-1"></i>구인구직</a></li>
                </ul>
                
                <div class="user-section">
                    {% if user.is_authenticated %}
                        <div class="mb-1">
                            <span class="small me-2">{{ user.username }}님</span>
                            <a href="/logout/" class="text-white small text-decoration-none border-start ps-2">로그아웃</a>
                        </div>
                        <a href="/new/" class="btn btn-post shadow-sm w-100">매물등록</a>
                    {% else %}
                        <a href="/login/" class="text-white me-3 text-decoration-none">로그인</a>
                        <a href="/signup/" class="btn btn-post">회원가입</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
